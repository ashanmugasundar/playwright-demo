{% extends 'accounts/base.html' %}
{% block title %}Users{% endblock %}
{% block content %}
<h2>Users</h2>
<table>
  <thead>
    <tr>
      <th>ID</th><th>Username</th><th>Email</th><th>Active</th><th>Staff</th><th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for u in users %}
      <tr>
        <td>{{ u.id }}</td>
        <td>{{ u.username }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.is_active }}</td>
        <td>{{ u.is_staff }}</td>
        <td>
          <a href="{% url 'user_edit' u.id %}" class="icon-btn" data-testid="edit-user-btn" title="Edit">✏️</a>
        </td>
      </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
