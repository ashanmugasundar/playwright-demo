name: Django Test Pipeline (Final Working)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

jobs:

  # ✅ UNIT
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: |
          pip install -r requirements.txt
          pip install pytest-html pytest-cov allure-pytest

      - run: |
          mkdir -p reports/unit allure-results/unit
          pytest -m unit \
            --cov=. \
            --cov-report=xml \
            --cov-report=html:reports/unit/coverage \
            --html=reports/unit/report.html \
            --self-contained-html \
            --alluredir=allure-results/unit

      - name: Generate coverage badge
        run: |
          pip install coverage-badge
          coverage-badge -o coverage.svg
          
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: coverage.svg

      - uses: actions/upload-artifact@v4
        with:
          name: unit-reports
          path: reports/unit/

      - uses: actions/upload-artifact@v4
        with:
          name: allure-unit
          path: allure-results/unit


  # ✅ API
  api-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: |
          pip install -r requirements.txt
          pip install pytest-html allure-pytest

      - run: |
          mkdir -p reports/api allure-results/api
          pytest -m api \
            --html=reports/api/report.html \
            --self-contained-html \
            --alluredir=allure-results/api

      - uses: actions/upload-artifact@v4
        with:
          name: api-reports
          path: reports/api/

      - uses: actions/upload-artifact@v4
        with:
          name: allure-api
          path: allure-results/api


  # ✅ E2E
  e2e-tests:
    runs-on: ubuntu-latest
    needs: api-tests

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: |
          pip install -r requirements.txt
          pip install pytest-html pytest-playwright allure-pytest
          playwright install chromium

      - run: |
          mkdir -p reports/e2e allure-results/e2e
          pytest -m e2e \
            --html=reports/e2e/report.html \
            --self-contained-html \
            --alluredir=allure-results/e2e

      - uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: reports/e2e/

      - uses: actions/upload-artifact@v4
        with:
          name: allure-e2e
          path: allure-results/e2e


  # ✅ FINAL PUBLISH (ALL REPORTS + ALLURE)
  publish-report:
    runs-on: ubuntu-latest
    needs: e2e-tests

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      # ✅ Prepare site
      - name: Prepare site
        run: |
          mkdir site

          echo "<h1>Test Reports</h1>" > site/index.html

          echo "<h3>Unit</h3>" >> site/index.html
          echo "<a href='unit/report.html'>Unit Report</a><br>" >> site/index.html
          echo "<a href='unit/coverage/index.html'>Unit Coverage</a><br>" >> site/index.html

          echo "<h3>API</h3>" >> site/index.html
          echo "<a href='api/report.html'>API Report</a><br>" >> site/index.html

          echo "<h3>E2E</h3>" >> site/index.html
          echo "<a href='e2e/report.html'>E2E Report</a><br>" >> site/index.html

          echo "<br><a href='allure/'>Allure Dashboard</a>" >> site/index.html

          mkdir -p site/unit site/api site/e2e
          cp -r all-reports/unit-reports/* site/unit/
          cp -r all-reports/api-reports/* site/api/
          cp -r all-reports/e2e-reports/* site/e2e/

      # ✅ Copy coverage badge
      - name: Copy Coverage Badge
        run: |
          mkdir -p site/badges
          cp all-reports/coverage-badge/coverage.svg site/badges/coverage.svg || true

      # ✅ Merge allure
      - name: Merge Allure Results
        run: |
          mkdir -p allure-results
          cp -r all-reports/allure-unit/* allure-results/ || true
          cp -r all-reports/allure-api/* allure-results/ || true
          cp -r all-reports/allure-e2e/* allure-results/ || true

      # ✅ Generate Allure
      - name: Generate Allure Report
        uses: andgineer/allure-report@v3.6
        if: always()
        with:
          allure-results: allure-results
          website: site
          reports-site-path: allure

      # ✅ Deploy
      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - uses: actions/deploy-pages@v4
