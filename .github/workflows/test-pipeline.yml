name: Django Test Pipeline (Multi-stage + Reports)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write


jobs:

  # ✅ STAGE 1 - UNIT
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pytest-html pytest-cov

      - name: Run Unit Tests
        run: |
          mkdir -p reports/unit
          pytest -m unit --alluredir=allure-results/unit \
            --cov=. --cov-report=xml \
            --cov-report=html:reports/unit/coverage \
            --html=reports/unit/report.html \
            --self-contained-html
     
      - name: Run Coverage Comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
    
      - name: Upload Unit Reports
        uses: actions/upload-artifact@v4
        with:
          name: unit-reports
          path: reports/unit/
            
      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-unit
          path: allure-results/unit


  # ✅ STAGE 2 - API
  api-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pytest-html

      - name: Run API Tests
        run: |
          mkdir -p reports/api
          pytest -m api --alluredir=allure-results/api \
            --html=reports/api/report.html \
            --self-contained-html

      - name: Upload API Reports
        uses: actions/upload-artifact@v4
        with:
          name: api-reports
          path: reports/api/
      
      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-api
          path: allure-results/api

  # ✅ STAGE 3 - E2E
  e2e-tests:
    runs-on: ubuntu-latest
    needs: api-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps
          pip install pytest-html

      - name: Run E2E Tests
        run: |
          mkdir -p reports/e2e
          pytest -m e2e --alluredir=allure-results/e2e \
            --html=reports/e2e/report.html \
            --self-contained-html

      - name: Upload E2E Reports
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: reports/e2e/

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-unit
          path: allure-results/unit

  # ✅ STAGE 4 - PUBLISH TO PAGES (ONLY IF ALL PASS)
  publish-report:
    runs-on: ubuntu-latest
    needs: e2e-tests

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: Prepare site
        run: |
          mkdir site

          echo "<h1>Test Reports Dashboard</h1>" > site/index.html

          echo "<h2>Unit</h2>" >> site/index.html
          echo "<a href='unit/report.html'>Unit Report</a><br>" >> site/index.html
          echo "<a href='unit/coverage/index.html'>Coverage</a><br>" >> site/index.html

          echo "<h2>API</h2>" >> site/index.html
          echo "<a href='api/report.html'>API Report</a><br>" >> site/index.html

          echo "<h2>E2E</h2>" >> site/index.html
          echo "<a href='e2e/report.html'>E2E Report</a><br>" >> site/index.html

          mkdir -p site/unit site/api site/e2e

          cp -r all-reports/unit-reports/* site/unit/
          cp -r all-reports/api-reports/* site/api/
          cp -r all-reports/e2e-reports/* site/e2e/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy
        uses: actions/deploy-pages@v4

  allure-report:
    runs-on: ubuntu-latest
    needs: e2e-tests

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge Allure results
        run: |
          mkdir -p allure-results
          cp -r artifacts/allure-unit/* allure-results/ || true
          cp -r artifacts/allure-api/* allure-results/ || true
          cp -r artifacts/allure-e2e/* allure-results/ || true

      - name: Generate Allure Report
        uses: andgineer/allure-report@v3.6
        id: allure
        if: always()
        with:
          allure-results: allure-results
          website: site
          reports-site-path: allure
